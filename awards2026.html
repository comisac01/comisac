    function renderResults() {
      const container = document.getElementById("results-container");

      Object.keys(awardsData).forEach(category => {
        const section = document.createElement("div");
        section.className = "mb-5";

        section.innerHTML = `<h4 class="font-weight-bold mb-4">${category}</h4>`;

        const row = document.createElement("div");
        row.className = "row";

        Object.keys(awardsData[category]).forEach(subCategory => {
          const winners = awardsData[category][subCategory];

          const col = document.createElement("div");
          col.className = "col-md-6 mb-4";

          col.innerHTML = `
            <div class="border rounded p-4 h-100 bg-light award-card">
              <h6 class="font-weight-bold mb-3">${subCategory}</h6>
              <ul class="mb-0">
                ${winners.map(name => `<li>${name}</li>`).join("")}
              </ul>
            </div>
          `;

          row.appendChild(col);
        });

        section.appendChild(row);
        container.appendChild(section);
      });
    }

    renderResults();
  </script>
